<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#1f6f8b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Santorin" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>Santorin — Lieux d'intérêt</title>
  </head>
  <body>
    <div id="app">
      <header class="app-bar">
        <h1 class="app-bar__title">Santorin</h1>
        <button
          id="view-toggle"
          class="app-bar__toggle"
          type="button"
          aria-pressed="false"
        >
          Liste
        </button>
      </header>

      <nav id="filter-bar" class="filter-bar" aria-label="Filtrer par catégorie"></nav>

      <main class="content">
        <div id="map" class="map" role="application" aria-label="Carte de Santorin"></div>
        <section id="list" class="poi-list" hidden aria-label="Liste des lieux"></section>
      </main>

      <div id="sheet-root"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
